# Publishes this n8n community node package to npm on version tag push, with npm provenance.
# Required for n8n Creator Portal verification from May 1, 2026 onward.
# See: https://docs.n8n.io/integrations/creating-nodes/deploy/submit-community-nodes/#submit-your-node-for-verification-by-n8n
#
# Setup (npm Trusted Publisher recommended):
# 1. npmjs.com → package → Access → Trusted Publishers → Add GitHub Actions
# 2. Repository owner, repository name, workflow file: publish.yml
# 3. Leave NPM_TOKEN unset, or set NPM_TOKEN for a granular access token fallback.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
